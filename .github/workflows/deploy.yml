name: Trigger Blog Rebuild

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    name: Trigger Cloudflare Pages rebuild for new Notion posts

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "OAS Blog Bot"
          git config user.email "info@oassolutions.com.ng"

      - name: Push rebuild trigger
        run: |
          echo "Last rebuild: $(date -u)" > .last-rebuild
          git add .last-rebuild
          git commit -m "chore: trigger blog rebuild $(date -u)"
          git push
