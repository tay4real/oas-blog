name: Deploy OAS Blog

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Run on every push to main
  push:
    branches:
      - main

  # Run automatically every 6 hours to pick up new Notion posts
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Generate blog from Notion and deploy to Cloudflare Pages




    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node generate.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: oas-blog
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
