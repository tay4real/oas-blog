name: Trigger Blog Rebuild

on:
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    name: Trigger Cloudflare Pages rebuild

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "OAS Blog Bot"
          git config --global user.email "info@oassolutions.com.ng"

      - name: Pull latest and push rebuild trigger
        run: |
          git pull origin main --rebase
          echo "Last rebuild: $(date -u)" > .last-rebuild
          git add .last-rebuild
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore: trigger blog rebuild $(date -u)"
          git push origin main